---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - git
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure install directory exists with correct owner
  ansible.builtin.file:
    path: "{{ label_printer_install_dir }}"
    state: directory
    recurse: true
    owner: "{{ label_printer_user }}"
    group: "{{ label_printer_user }}"

- name: Clone or update service repository
  become: true
  become_user: "{{ label_printer_user }}"
  ansible.builtin.git:
    repo: "https://github.com/eledio-manufacturing/printer-tsc.git"
    dest: "{{ label_printer_install_dir }}"
    version: main
    force: true
  notify: Restart printer

- name: Fix uv cache ownership for service user
  ansible.builtin.file:
    path: "/home/{{ label_printer_user }}/.cache/uv"
    state: directory
    owner: "{{ label_printer_user }}"
    group: "{{ label_printer_user }}"
    recurse: true

- name: Check venv python executable by service user
  become: true
  become_user: "{{ label_printer_user }}"
  ansible.builtin.command:
    cmd: "{{ label_printer_install_dir }}/.venv/bin/python --version"
  register: label_printer_python_check
  failed_when: false
  changed_when: false
  environment:
    HOME: "/home/{{ label_printer_user }}"

- name: Remove venv if python not accessible by service user
  ansible.builtin.file:
    path: "{{ label_printer_install_dir }}/.venv"
    state: absent
  when: label_printer_python_check.rc != 0

- name: Sync python dependencies
  become: true
  become_user: "{{ label_printer_user }}"
  ansible.builtin.command:
    cmd: /usr/local/bin/uv sync
    chdir: "{{ label_printer_install_dir }}"
  environment:
    HOME: "/home/{{ label_printer_user }}"
  register: label_printer_uv_sync
  changed_when: "'Installed' in label_printer_uv_sync.stdout or 'Updated' in label_printer_uv_sync.stdout"
  notify: Restart printer

- name: Deploy station config
  ansible.builtin.copy:
    content: "{{ label_printer_config_content }}"
    dest: "{{ label_printer_install_dir }}/config/config.yaml"
    owner: "{{ label_printer_user }}"
    group: "{{ label_printer_user }}"
    mode: '0600'
  notify: Restart printer

- name: Add service user to lp group for USB printer access
  ansible.builtin.user:
    name: "{{ label_printer_user }}"
    groups: lp
    append: true

- name: Deploy systemd service
  ansible.builtin.template:
    src: printer.service.j2
    dest: /etc/systemd/system/printer.service
    mode: '0644'
  notify: Restart printer

- name: Enable and start service
  ansible.builtin.systemd:
    name: printer
    state: started
    enabled: true
